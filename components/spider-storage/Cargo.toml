[package]
name = "spider-storage"
version = "0.1.0"
edition = "2024"

[lib]
name = "spider_storage"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1.89"
const_format = "0.2.35"
secrecy = { version = "0.10.3", features = ["serde"] }
serde = { version = "1.0.228", features = ["derive"] }
spider-core = { path = "../spider-core" }
sqlx = { version = "0.8.6", features = ["mysql", "runtime-tokio"] }
thiserror = "2.0.18"
tokio = { version = "1.49.0", features = ["rt-multi-thread", "sync"] }

[dev-dependencies]
anyhow = "1.0.98"
dashmap = "6.1.0"
rand = "0.9.1"
tokio = { version = "1.49.0", features = ["macros", "rt-multi-thread", "sync"] }
