[package]
name = "spider-storage"
version = "0.1.0"
edition = "2024"

[lib]
name = "spider_storage"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1.89"
serde = { version = "1.0.228", features = ["derive"] }
spider-core = { path = "../spider-core" }
sqlx = "0.8.6"
thiserror = "2.0.18"
tokio = { version = "1.49.0", features = ["rt-multi-thread", "sync"] }
