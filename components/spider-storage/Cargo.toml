[package]
name = "spider-storage"
version = "0.1.0"
edition = "2024"

[lib]
name = "spider_storage"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1.89"
const_format = "0.2.35"
serde_json = "1.0.149"
spider-core = { path = "../spider-core" }
sqlx = { version = "0.8.6", features = ["mysql", "runtime-tokio"] }
strum = "0.27.2"
thiserror = "2.0.18"
uuid = { version = "1.19.0", features = ["serde"] }
