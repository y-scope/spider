apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: {{ include "spider.componentFullname" (dict "root" . "component" "worker") }}
  labels:
    {{- include "spider.labels" . | nindent 4 }}
    app.kubernetes.io/component: "worker"
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "spider.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: "worker"
  template:
    metadata:
      labels:
        {{- include "spider.labels" . | nindent 8 }}
        app.kubernetes.io/component: "worker"
    spec:
      initContainers:
        # The execution manager registers its Pod IP with storage, while the rest of its endpoints
        # use Kubernetes Service DNS names. Render the Pod-specific value into a writable config
        # volume before starting the manager.
        - name: "render-config"
          image: {{ include "spider.imageRef" (dict "root" . "component" "worker") | quote }}
          imagePullPolicy: {{ .Values.image.worker.pullPolicy | quote }}
          command:
            - "sh"
            - "-c"
            - |
              set -eu
              sed "s/__EXECUTION_MANAGER_HOST__/${POD_IP}/" \
                /etc/spider/template/execution-manager.yaml > /etc/spider/execution-manager.yaml
          env:
            - name: "POD_IP"
              valueFrom:
                fieldRef:
                  fieldPath: "status.podIP"
          volumeMounts:
            - name: "config-template"
              mountPath: "/etc/spider/template"
              readOnly: true
            - name: "config"
              mountPath: "/etc/spider"
      containers:
        - name: "execution-manager"
          image: {{ include "spider.imageRef" (dict "root" . "component" "worker") | quote }}
          imagePullPolicy: {{ .Values.image.worker.pullPolicy | quote }}
          command: ["spider-execution-manager", "--config", "/etc/spider/execution-manager.yaml"]
          volumeMounts:
            - name: "config"
              mountPath: "/etc/spider"
              readOnly: true
      volumes:
        - name: "config-template"
          configMap:
            name: {{ include "spider.componentFullname" (dict "root" . "component" "config") }}
        - name: "config"
          emptyDir: {}
