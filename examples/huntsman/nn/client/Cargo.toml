[package]
name = "huntsman-nn-client"
version = "0.1.0"
edition = "2024"
publish = false

[[bin]]
name = "nn-client"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.98"
clap = { version = "4.6.1", features = ["derive"] }
huntsman-nn-core = { path = "../core" }
rand = "0.9.1"
rmp-serde = "1.3.1"
spider-client = { path = "../../../../components/spider-client" }
spider-core = { path = "../../../../components/spider-core" }
spider-utils = { path = "../../../../components/spider-utils" }
tokio = { version = "1.50.0", features = ["macros", "rt-multi-thread", "time"] }
tonic = "0.14.6"
tracing = { version = "0.1.41", default-features = false, features = ["std"] }
