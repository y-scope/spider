[package]
name = "huntsman-nn-tasks"
version = "0.1.0"
edition = "2024"
publish = false

[lib]
crate-type = ["cdylib"]
name = "nn"
path = "src/lib.rs"

[dependencies]
huntsman-nn-core = { path = "../core" }
serde = { version = "1.0.228", features = ["derive"] }
spider-tdl = {
  path = "../../../../components/spider-tdl",
  features = ["derive"]
}
