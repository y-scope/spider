name: "Repo checkout"
description: "Check out this repository with recursive submodules using a pinned checkout action"

runs:
  using: "composite"
  steps:
    - name: "Check out repository"
      uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
      with:
        submodules: "recursive"
