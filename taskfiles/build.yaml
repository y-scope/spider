version: "3"

includes:
  toolchains: "toolchains.yaml"

tasks:
  cpp-target:
    internal: true
    vars:
      TARGETS:
        ref: "default (list \"all\") .TARGETS"
    deps: [":config-cmake-project"]
    cmds:
      - >-
        cmake
        --build "{{.G_BUILD_SPIDER_DIR}}"
        --parallel {{numCPU}}
        --target {{range .TARGETS}}{{.}} {{end}}

  cpp-clean:
    internal: true
    deps: [":config-cmake-project"]
    cmds:
      - "cmake --build {{.G_BUILD_SPIDER_DIR}} --target clean --parallel {{numCPU}}"

  spider-py:
    cmds:
      - "uv build --directory {{.G_SRC_PYTHON_DIR}} -o {{.G_BUILD_PYTHON_DIR}}"

  spider-proto-rust-codegen:
    env:
      SPIDER_PROTO_RUST_GENERATE_FROM_SOURCE: "ON"
    dir: "{{.ROOT_DIR}}"
    deps: ["toolchains:rust"]
    cmd: |-
      . "{{.G_RUST_TOOLCHAIN_ENV_FILE}}"
      cargo build --release --package spider-proto-rust

  rust:
    dir: "{{.ROOT_DIR}}"
    deps:
      - "toolchains:rust"
    cmd: |-
      . "{{.G_RUST_TOOLCHAIN_ENV_FILE}}"
      cargo build --release --all-features

  # Builds the workspace, then stages the compiled task libraries (cdylibs) into the on-disk layout
  # the task executor dlopens: `${G_TDL_PACKAGES_DIR}/<package_name>/lib<package_name>.so`. Run this
  # before launching the stack with `run.py` so task executors can resolve packages referenced by
  # submitted jobs.
  packages:
    dir: "{{.ROOT_DIR}}"
    vars:
      G_TDL_PACKAGES_DIR: "{{.G_BUILD_DIR}}/tdl_packages"
      G_RUST_RELEASE_DIR: "{{.G_RUST_BUILD_DIR}}/release"
    deps:
      - "toolchains:rust"
    cmd: |-
      . "{{.G_RUST_TOOLCHAIN_ENV_FILE}}"
      cargo build --release --workspace --all-features
      mkdir -p "{{.G_TDL_PACKAGES_DIR}}/complex" \
               "{{.G_TDL_PACKAGES_DIR}}/integration_test_tasks" \
               "{{.G_TDL_PACKAGES_DIR}}/clp_search"
      cp "{{.G_RUST_RELEASE_DIR}}/libhuntsman_complex.so" \
         "{{.G_TDL_PACKAGES_DIR}}/complex/libcomplex.so"
      cp "{{.G_RUST_RELEASE_DIR}}/libintegration_test_tasks.so" \
         "{{.G_TDL_PACKAGES_DIR}}/integration_test_tasks/libintegration_test_tasks.so"
      cp "{{.G_RUST_RELEASE_DIR}}/libclp_search.so" \
         "{{.G_TDL_PACKAGES_DIR}}/clp_search/libclp_search.so"

  tdl-generate-parsers:
    vars:
      CHECKSUM_FILE: "{{.G_BUILD_DIR}}/{{.TASK}}.md5"
      OUTPUT_DIR: "{{.G_SRC_SPIDER_DIR}}/tdl/parser/antlr_generated"
    deps:
      - ":deps:install-antlr-jar"
      - task: ":utils:checksum:validate"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.OUTPUT_DIR}}"]
    generates: ["{{.CHECKSUM_FILE}}"]
    sources:
      - "{{.G_SRC_SPIDER_DIR}}/tdl/parser/TaskDefLang.g4"
    dir: "{{.G_SRC_SPIDER_DIR}}"
    cmds:
      - |-
        rm -rf "{{.OUTPUT_DIR}}/"* \
        && java -jar {{.G_ANTLR_JAR_FILE}} \
          -Dlanguage=Cpp \
          -no-listener \
          -visitor \
          -package spider::tdl::parser::antlr_generated \
          -o tdl/parser/antlr_generated \
          -Xexact-output-dir \
          tdl/parser/TaskDefLang.g4 \
        && find "{{.OUTPUT_DIR}}" \
          -type f -and -not \( -name "*.cpp" -o -name "*.h" \) \
          -exec rm {} \;

      # This command must be last
      - task: ":utils:checksum:compute"
        vars:
          CHECKSUM_FILE: "{{.CHECKSUM_FILE}}"
          INCLUDE_PATTERNS: ["{{.OUTPUT_DIR}}"]
